name: Build

# Builds installable Dago artifacts for Windows, macOS, and Linux via
# electron-builder. Runs on every push to a version tag, or manually via the
# Actions tab. Signing is entirely optional and additive: electron-builder
# reads the standard CSC_LINK/CSC_KEY_PASSWORD (and, on macOS, the
# APPLE_* notarization variables) from repo secrets if a maintainer has
# added them, and produces unsigned artifacts otherwise. Nobody set those
# secrets up as part of this change - a maintainer with an actual Apple
# Developer ID / Windows code-signing certificate has to add them under
# Settings > Secrets and variables > Actions before signed builds happen.
# See docs/ROADMAP.md and docs/ARCHITECTURE.md for the current status.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned/signed artifacts
        run: npm run dist -- --publish never
        env:
          # Only used if the maintainer has configured them as repo secrets;
          # electron-builder falls back to unsigned output if they're unset.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dago-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: warn
