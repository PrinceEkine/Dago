<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>New Tab</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1b26;
    color: #565f89;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  .wordmark { font-size: 42px; font-weight: 600; color: #3b4261; letter-spacing: 2px; }
  .hint { margin-top: 12px; font-size: 13px; }
  code { background: #24283b; padding: 2px 6px; border-radius: 4px; color: #7aa2f7; }
</style>
</head>
<body>
  <div style="text-align:center">
    <div class="wordmark">Dago</div>
    <div class="hint">Type an address, or visit <code>dago://history</code> / <code>dago://settings</code> / <code>dago://screenshare</code></div>
  </div>
</body>
</html>
