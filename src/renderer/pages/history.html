<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'" />
  <title>Dago - History</title>
  <link rel="stylesheet" href="pages.css" />
</head>
<body>
  <div id="pin-gate" class="panel">
    <h1><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>History is PIN protected</h1>
    <p id="pin-instructions">Enter your PIN to view browsing history.</p>
    <input id="pin-input" type="password" inputmode="numeric" autocomplete="off" placeholder="PIN" />
    <button id="pin-submit">Unlock</button>
    <p id="pin-error" class="error"></p>
  </div>

  <div id="history-view" class="panel hidden">
    <div class="header-row">
      <h1><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>History</h1>
      <div>
        <button id="lock-btn">Lock</button>
        <button id="clear-btn" class="danger">Clear all</button>
      </div>
    </div>
    <input id="search-box" type="text" placeholder="Search history…" />
    <ul id="history-list"></ul>
    <p id="empty-msg" class="hidden">No history yet.</p>
  </div>

  <script src="history.js"></script>
</body>
</html>
