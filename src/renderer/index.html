<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'" />
  <title>Dago</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="chrome">
    <div id="tabstrip">
      <div id="tabs"></div>
      <button id="new-tab-btn" title="New tab">+</button>
    </div>

    <div id="toolbar">
      <button id="back-btn" class="icon-btn" title="Back">&#8592;</button>
      <button id="forward-btn" class="icon-btn" title="Forward">&#8594;</button>
      <button id="reload-btn" class="icon-btn" title="Reload">&#8635;</button>
      <input id="address-bar" type="text" placeholder="Search or enter address - dago://history, dago://settings" />
      <button id="new-identity-btn" class="icon-btn" title="New Tor identity for this tab">&#9851;</button>
      <button id="screenshare-btn" class="icon-btn" title="Screenshare">&#128421;</button>
      <button id="history-btn" class="icon-btn" title="History (PIN protected)">&#128274;</button>
      <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
    </div>

    <div id="statusbar">
      <span id="tor-status" class="status-pill status-unknown">Tor: checking…</span>
      <span id="adblock-status" class="status-pill">Tracker blocking: on</span>
    </div>
  </div>

  <div id="webview-host"></div>

  <script src="renderer.js"></script>
</body>
</html>
